name: MLOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4  # Use stable v4

    - name: Set up Python
      uses: actions/setup-python@v5  # Use stable v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools  # Fixes the 'pkg_resources' error in Python 3.12
        pip install -r requirements.txt
        pip install pytest

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools  # This provides the missing pkg_resources
        pip install -r requirements.txt
        pip install pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # Only push on actual merges/pushes to main, not every PR sync
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6 # Action v6 is latest for Docker
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/iris-app:latest
          ${{ secrets.DOCKER_USERNAME }}/iris-app:${{ github.sha }}